name: Publish

on:
  push:
    branches:
      - dev
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Determine publish type
        id: publish_type
        run: |
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "type=dev" >> $GITHUB_OUTPUT
          else
            echo "type=release" >> $GITHUB_OUTPUT
          fi

      - name: Set dev version
        if: steps.publish_type.outputs.type == 'dev'
        id: version_dev
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          # Create prerelease version: 2.0.0 -> 2.0.0-dev.2025052314
          DEV_VERSION="${CURRENT%%-*}.dev$(date +%Y%m%d%H%M%S)"
          echo "version=$DEV_VERSION" >> $GITHUB_OUTPUT
          echo "Dev version: $DEV_VERSION"
          # Update package.json
          node -e "const pkg=require('./package.json');pkg.version='$DEV_VERSION';require('fs').writeFileSync('./package.json',JSON.stringify(pkg,null,2)+'\n')"

      - name: Install standard-version
        if: steps.publish_type.outputs.type == 'release'
        run: bun add -D standard-version

      - name: Bump version
        if: steps.publish_type.outputs.type == 'release'
        id: version_release
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT"
          
          # Run standard-version to bump version
          npx standard-version --release-as patch
          
          # Get the new version
          NEW=$(node -p "require('./package.json').version")
          echo "New version: $NEW"
          echo "version=$NEW" >> $GITHUB_OUTPUT

      - name: Push version bump
        if: steps.publish_type.outputs.type == 'release'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.version_release.outputs.version }}"
          git push

      - name: Create GitHub Release
        if: steps.publish_type.outputs.type == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version_release.outputs.version }}
          name: Release v${{ steps.version_release.outputs.version }}
          generate_release_notes: true

      - name: Publish to npm
        run: |
          if [[ "${{ steps.publish_type.outputs.type }}" == "dev" ]]; then
            npm publish --tag dev --access public
          else
            npm publish --access public
          fi
